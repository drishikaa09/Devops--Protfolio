name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: |
          scp -i ~/.ssh/id_rsa index.html Dockerfile azureuser@${{ secrets.SERVER_IP }}:/home/azureuser/devops-portfolio/

      - name: SSH and deploy
        run: |
          ssh -i ~/.ssh/id_rsa azureuser@${{ secrets.SERVER_IP }} "
            cd /home/azureuser/devops-portfolio &&
            docker build -t portfolio . &&
            docker stop portfolio || true &&
            docker rm portfolio || true &&
            docker run -d --name portfolio -p 80:80 portfolio
          "